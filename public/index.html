<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Corporativo</title>
    <style>
        /* --- COLORES DE LA EMPRESA --- */
        :root {
            --azul: #003399;
            --amarillo: #ffcc00;
            --blanco: #ffffff;
            --negro: #111111;
            --gris-claro: #f4f6f9;
        }

        /* --- ESTILOS GENERALES --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: var(--gris-claro); 
            color: var(--negro);
        }
        
        /* --- CABECERA Y MENÚ --- */
        header { 
            background: var(--azul); 
            color: var(--blanco); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .menu-btn { 
            font-size: 24px; 
            cursor: pointer; 
            background: none; 
            border: none; 
            color: var(--blanco); 
            margin-right: 20px; 
        }
        
        .sidebar { 
            height: 100%; 
            width: 0; 
            position: fixed; 
            z-index: 10; 
            top: 0; 
            left: 0; 
            background-color: var(--negro); 
            overflow-x: hidden; 
            transition: 0.3s; 
            padding-top: 60px; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }
        .sidebar a { 
            padding: 15px 25px; 
            text-decoration: none; 
            font-size: 18px; 
            color: var(--blanco); 
            display: block; 
            transition: 0.3s; 
            border-bottom: 1px solid #222222;
        }
        .sidebar a:hover { 
            color: var(--negro); 
            background-color: var(--amarillo); 
        }
        .sidebar .close-btn { 
            position: absolute; 
            top: 10px; 
            right: 20px; 
            font-size: 36px; 
            border: none; 
            background: none; 
            color: var(--blanco); 
            cursor: pointer;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-container { 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            height: calc(100vh - 120px); 
        }
        
        /* Cajas principales (Cartelera o Empleados) */
        .panel-box { 
            background: var(--blanco); 
            width: 100%; 
            max-width: 1000px; 
            border: 2px solid var(--azul);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .panel-header {
            background: var(--azul);
            color: var(--blanco);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--negro);
        }
        .panel-header h2 {
            margin: 0;
            font-size: 22px;
            text-transform: uppercase;
        }

        .btn-agregar {
            background: var(--amarillo);
            color: var(--negro);
            border: 2px solid var(--negro);
            border-radius: 0; 
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-agregar:hover {
            background: var(--blanco);
            color: var(--azul);
            border-color: var(--azul);
        }
        
        .seccion-contenido { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            background-color: var(--blanco); 
        }
        .seccion-secundaria { 
            padding: 20px; 
            overflow-y: auto; 
            background-color: var(--gris-claro); 
            border-top: 2px solid var(--azul); 
            max-height: 35%;
        }
        
        h3, h4 { 
            margin-top: 0; 
            color: var(--azul); 
            text-transform: uppercase;
            border-bottom: 1px solid var(--azul);
            padding-bottom: 5px;
        }
        
        /* --- TARJETAS DE EVENTOS --- */
        .evento-card { 
            background: var(--blanco); 
            border-left: 5px solid var(--azul); 
            border-right: 1px solid #ddd;
            border-top: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            padding: 12px; 
            margin-bottom: 15px; 
        }
        .evento-card h5 { margin: 0 0 5px 0; font-size: 16px; color: var(--negro); }
        .evento-card p { margin: 0; font-size: 14px; color: #555; }
        .evento-actions { display: flex; gap: 10px; margin-top: 10px; }
        
        /* --- TARJETAS DE EMPLEADOS --- */
        .empleado-card {
            background: var(--blanco);
            border: 1px solid #ddd;
            border-left: 5px solid var(--azul);
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .empleado-info h5 {
            margin: 0;
            font-size: 18px;
            color: var(--negro);
            text-transform: uppercase;
        }
        .empleado-info small {
            color: #666;
            font-size: 12px;
        }
        .empleado-modulos {
            display: flex;
            gap: 8px;
        }
        .btn-modulo {
            background: var(--blanco);
            color: var(--azul);
            border: 1px solid var(--azul);
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 0;
            transition: 0.2s;
        }
        .btn-modulo:hover {
            background: var(--azul);
            color: var(--blanco);
        }

        /* Botones de acción genéricos */
        .btn-action-edit { background: var(--azul); color: var(--blanco); border: 1px solid var(--negro); padding: 5px 12px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-action-edit:hover { background: var(--amarillo); color: var(--negro); }
        .btn-action-delete { background: #cc0000; color: var(--blanco); border: 1px solid var(--negro); padding: 5px 12px; font-size: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-action-delete:hover { background: var(--negro); }

        /* --- VENTANAS MODALES --- */
        .modal { display: none; position: fixed; z-index: 20; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
        .modal-content { background-color: var(--blanco); margin: 8% auto; padding: 25px; border: 3px solid var(--azul); border-radius: 0; width: 90%; max-width: 400px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; font-weight: bold; color: var(--negro); cursor: pointer; }
        .close-modal:hover { color: var(--azul); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--negro); }
        .form-group input[type="text"], .form-group input[type="datetime-local"] { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid var(--negro); border-radius: 0; }
        .btn-submit { width: 100%; padding: 12px; background: var(--azul); color: var(--blanco); border: 1px solid var(--negro); font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-submit:hover { background: var(--amarillo); color: var(--negro); }
    </style>
</head>
<body>

    <div id="miSidebar" class="sidebar">
        <button class="close-btn" onclick="cerrarMenu()">&times;</button>
        <a href="javascript:void(0)" onclick="cambiarVista('cartelera')">Inicio / Cartelera</a>
        <a href="javascript:void(0)" onclick="cambiarVista('empleados')">Empleados</a>
        <a href="#">Configuracion</a>
    </div>

    <header>
        <button class="menu-btn" onclick="abrirMenu()">&#9776;</button>
        <h1 id="titulo-header">Panel de Control</h1>
    </header>

    <div class="main-container">
        
        <div id="vista-cartelera" class="panel-box">
            <div class="panel-header">
                <h2>Cartelera</h2>
                <button class="btn-agregar" onclick="abrirModalEvento()">Agregar evento</button>
            </div>
            <div class="seccion-contenido">
                <h3>Eventos de Hoy</h3>
                <div id="lista-hoy">Cargando eventos...</div>
            </div>
            <div class="seccion-secundaria">
                <h4>Proximos Eventos</h4>
                <div id="lista-futuros">Cargando eventos...</div>
            </div>
        </div>

        <div id="vista-empleados" class="panel-box" style="display: none;">
            <div class="panel-header">
                <h2>Lista de Empleados</h2>
                <button class="btn-agregar" onclick="abrirModalEmpleado()">Agregar Empleado</button>
            </div>
            <div class="seccion-contenido">
                <div id="lista-empleados">Cargando empleados...</div>
            </div>
        </div>

    </div>

    <div id="modalEvento" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal('modalEvento')">&times;</span>
            <h2 id="modalTitleEvento" style="margin-top: 0; color: var(--azul);">Agregar Evento</h2>
            <form id="formEvento">
                <div class="form-group">
                    <label>Nombre del Evento</label>
                    <input type="text" id="nombreEvento" required>
                </div>
                <div class="form-group">
                    <label>Fecha y Hora de Inicio</label>
                    <input type="datetime-local" id="fechaEvento" required>
                </div>
                <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="todoElDia" onchange="toggleDuracion()">
                    <label style="margin: 0; font-weight: normal;">¿Es todo el dia?</label>
                </div>
                <div class="form-group" id="duracionGroup">
                    <label>Duracion</label>
                    <input type="text" id="duracionEvento">
                </div>
                <button type="submit" id="btnSubmitEvento" class="btn-submit">Guardar Evento</button>
            </form>
        </div>
    </div>

    <div id="modalEmpleado" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarModal('modalEmpleado')">&times;</span>
            <h2 style="margin-top: 0; color: var(--azul);">Agregar Empleado</h2>
            <form id="formEmpleado">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="nombreEmpleado" placeholder="Ej. Juan Perez" required>
                </div>
                <button type="submit" class="btn-submit">Guardar Empleado</button>
            </form>
        </div>
    </div>

    <script>
        // --- NAVEGACIÓN Y MENÚ ---
        function abrirMenu() { document.getElementById("miSidebar").style.width = "250px"; }
        function cerrarMenu() { document.getElementById("miSidebar").style.width = "0"; }

        function cambiarVista(vista) {
            document.getElementById('vista-cartelera').style.display = 'none';
            document.getElementById('vista-empleados').style.display = 'none';
            
            if(vista === 'cartelera') {
                document.getElementById('vista-cartelera').style.display = 'flex';
                cargarEventos();
            } else if (vista === 'empleados') {
                document.getElementById('vista-empleados').style.display = 'flex';
                cargarEmpleados();
            }
            cerrarMenu();
        }

        // --- CONTROL DE MODALES ---
        function cerrarModal(id) { document.getElementById(id).style.display = "none"; }
        window.onclick = function(event) { 
            if (event.target.classList.contains('modal')) event.target.style.display = "none"; 
        }

        // === LÓGICA DE EVENTOS (CARTELERA) ===
        let editEventId = null;
        window.currentEvents = [];

        function toggleDuracion() {
            const isTodoElDia = document.getElementById('todoElDia').checked;
            document.getElementById('duracionGroup').style.display = isTodoElDia ? 'none' : 'block';
        }

        function abrirModalEvento() {
            editEventId = null;
            document.getElementById('modalTitleEvento').innerText = 'Agregar Evento';
            document.getElementById('btnSubmitEvento').innerText = 'Guardar Evento';
            document.getElementById('formEvento').reset();
            toggleDuracion();
            document.getElementById('modalEvento').style.display = "block";
        }

        function prepararEdicionEvento(id) {
            const ev = window.currentEvents.find(e => e._id === id);
            if (!ev) return;
            
            editEventId = id;
            document.getElementById('modalTitleEvento').innerText = 'Editar Evento';
            document.getElementById('btnSubmitEvento').innerText = 'Actualizar Evento';
            document.getElementById('nombreEvento').value = ev.title;
            
            const d = new Date(ev.date);
            const localISO = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
            document.getElementById('fechaEvento').value = localISO;
            document.getElementById('todoElDia').checked = ev.allDay;
            document.getElementById('duracionEvento').value = ev.duration || '';
            
            toggleDuracion();
            document.getElementById('modalEvento').style.display = "block";
        }

        document.getElementById('formEvento').addEventListener('submit', async (e) => {
            e.preventDefault();
            const eventoData = {
                title: document.getElementById('nombreEvento').value,
                date: document.getElementById('fechaEvento').value,
                allDay: document.getElementById('todoElDia').checked,
                duration: document.getElementById('duracionEvento').value
            };

            try {
                const url = editEventId ? `/api/events/${editEventId}` : '/api/events';
                const method = editEventId ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(eventoData)
                });
                if (res.ok) {
                    cerrarModal('modalEvento');
                    cargarEventos(); 
                }
            } catch (error) { console.error(error); alert("Error al procesar evento"); }
        });

        async function eliminarEvento(id) {
            if (!confirm("¿Eliminar este evento?")) return;
            try {
                const res = await fetch(`/api/events/${id}`, { method: 'DELETE' });
                if (res.ok) cargarEventos();
            } catch (error) { console.error(error); }
        }

        async function cargarEventos() {
            try {
                const res = await fetch('/api/events');
                const eventos = await res.json();
                window.currentEvents = eventos;
                
                const contHoy = document.getElementById('lista-hoy');
                const contFuturo = document.getElementById('lista-futuros');
                contHoy.innerHTML = ''; contFuturo.innerHTML = '';

                const fechaActual = new Date();
                fechaActual.setHours(0, 0, 0, 0);

                eventos.forEach(ev => {
                    const fechaEv = new Date(ev.date);
                    const sinHora = new Date(ev.date);
                    sinHora.setHours(0, 0, 0, 0);

                    const horaFmt = ev.allDay ? 'Todo el dia' : fechaEv.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const durFmt = (ev.duration && !ev.allDay) ? ` - Duracion: ${ev.duration}` : '';
                    
                    const div = document.createElement('div');
                    div.className = 'evento-card';
                    const actionsHtml = `<div class="evento-actions">
                            <button class="btn-action-edit" onclick="prepararEdicionEvento('${ev._id}')">Editar</button>
                            <button class="btn-action-delete" onclick="eliminarEvento('${ev._id}')">Eliminar</button>
                        </div>`;

                    if (sinHora.getTime() === fechaActual.getTime()) {
                        div.innerHTML = `<h5>${ev.title}</h5><p>Inicio: ${horaFmt}${durFmt}</p>${actionsHtml}`;
                        contHoy.appendChild(div);
                    } else if (sinHora.getTime() > fechaActual.getTime()) {
                        const fechaFmt = fechaEv.toLocaleDateString();
                        div.innerHTML = `<h5>${ev.title}</h5><p>Fecha: ${fechaFmt} | Inicio: ${horaFmt}${durFmt}</p>${actionsHtml}`;
                        contFuturo.appendChild(div);
                    }
                });

                if(contHoy.innerHTML === '') contHoy.innerHTML = '<p style="color:#666;">No hay eventos para hoy.</p>';
                if(contFuturo.innerHTML === '') contFuturo.innerHTML = '<p style="color:#666;">No hay eventos futuros.</p>';
            } catch (error) { console.error(error); }
        }

        // === LÓGICA DE EMPLEADOS ===
        function abrirModalEmpleado() {
            document.getElementById('formEmpleado').reset();
            document.getElementById('modalEmpleado').style.display = "block";
        }

        document.getElementById('formEmpleado').addEventListener('submit', async (e) => {
            e.preventDefault();
            const empleadoData = { nombre: document.getElementById('nombreEmpleado').value };
            try {
                const res = await fetch('/api/employees', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(empleadoData)
                });
                if (res.ok) {
                    cerrarModal('modalEmpleado');
                    cargarEmpleados();
                }
            } catch (error) { console.error(error); alert("Error al guardar empleado"); }
        });

        function abrirModulo(modulo, nombreEmpleado) {
            // Esta funcion se configurara mas adelante segun tus indicaciones
            alert(`Abriendo seccion de ${modulo.toUpperCase()} para el empleado: ${nombreEmpleado}`);
        }

        async function cargarEmpleados() {
            try {
                const res = await fetch('/api/employees');
                const empleados = await res.json();
                const contenedor = document.getElementById('lista-empleados');
                contenedor.innerHTML = '';

                if(empleados.length === 0) {
                    contenedor.innerHTML = '<p style="color:#666;">No hay empleados registrados.</p>';
                    return;
                }

                empleados.forEach(emp => {
                    const fechaCreacion = new Date(emp.createdAt).toLocaleDateString();
                    
                    const div = document.createElement('div');
                    div.className = 'empleado-card';
                    
                    div.innerHTML = `
                        <div class="empleado-info">
                            <h5>${emp.nombre}</h5>
                            <small>Registrado el: ${fechaCreacion}</small>
                        </div>
                        <div class="empleado-modulos">
                            <button class="btn-modulo" onclick="abrirModulo('legajo', '${emp.nombre}')">Legajo</button>
                            <button class="btn-modulo" onclick="abrirModulo('asistencias', '${emp.nombre}')">Asistencias</button>
                            <button class="btn-modulo" onclick="abrirModulo('evaluacion', '${emp.nombre}')">Evaluacion</button>
                            <button class="btn-modulo" onclick="abrirModulo('sanciones', '${emp.nombre}')">Sanciones</button>
                            <button class="btn-modulo" onclick="abrirModulo('epp', '${emp.nombre}')">EPP</button>
                        </div>
                    `;
                    contenedor.appendChild(div);
                });
            } catch (error) { 
                console.error(error); 
                document.getElementById('lista-empleados').innerHTML = '<p>Error al cargar empleados.</p>';
            }
        }

        // Iniciar la app cargando la cartelera
        cargarEventos();
    </script>
</body>
</html>
